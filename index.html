<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>えいごペット</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="えいごペット">
<meta name="theme-color" content="#eef4ea">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{ --green:#3b6d3b; --green2:#5a8f4f; --bg:#eef4ea; --card:#ffffff; --line:#dfe8da;
         --food:#ef9f27; --happy:#3fb98a; --xp:#3b8ad4; --ink:#27402a; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Sans",sans-serif;
        background:var(--bg); color:var(--ink); overscroll-behavior:none;
        padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom); user-select:none; }
  .screen{ max-width:440px; margin:0 auto; padding:14px 16px 24px; display:none; }
  .screen.on{ display:block; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .name{ font-size:20px; font-weight:700; color:var(--green); }
  .pill{ font-size:13px; background:#e3efdd; color:var(--green); padding:4px 12px; border-radius:999px; font-weight:700; }
  .stage{ display:flex; gap:8px; align-items:center; }
  .badge{ font-size:12px; background:#dfeefb; color:#1f5f9c; padding:3px 10px; border-radius:999px; font-weight:700; }

  .yard{ position:relative; height:230px; border-radius:24px; background:#f1ead7;
         overflow:hidden; border:1px solid #e2d8bd; }
  .yard .dots{ position:absolute; inset:0; background-image:radial-gradient(rgba(74,53,38,.10) 2px, transparent 2px);
               background-size:18px 18px; }
  .ground{ position:absolute; left:0; right:0; bottom:0; height:46px; background:#e7dcbf; }
  @keyframes bob{ 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }
  @keyframes hop{ 0%{transform:translateX(-50%) translateY(0)} 30%{transform:translateX(-50%) translateY(-22px)} 60%{transform:translateX(-50%) translateY(0)} 80%{transform:translateX(-50%) translateY(-8px)} 100%{transform:translateX(-50%) translateY(0)} }
  #petWrap{ position:absolute; bottom:40px; left:50%; transform:translateX(-50%); animation:bob 1.6s steps(2) infinite; }
  #petWrap.happy{ animation:hop .6s 2; }
  #poop{ position:absolute; bottom:44px; left:34px; display:none; }
  #bubble{ position:absolute; top:14px; left:50%; transform:translateX(-50%);
           background:#fff; border:1px solid var(--line); border-radius:999px;
           padding:5px 14px; font-size:14px; font-weight:700; color:var(--green); opacity:0; transition:opacity .2s; }

  .stats{ margin:14px 0 6px; display:flex; flex-direction:column; gap:9px; }
  .stat{ display:flex; align-items:center; gap:10px; }
  .stat .ic{ width:24px; text-align:center; font-size:18px; }
  .bar{ flex:1; height:11px; border-radius:8px; background:#e0e8db; overflow:hidden; }
  .bar > i{ display:block; height:100%; width:0; transition:width .35s; }

  .care{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
  .cbtn{ border:1px solid var(--line); background:var(--card); border-radius:16px; padding:12px 0;
         display:flex; flex-direction:column; align-items:center; gap:5px; font-size:13px; font-weight:700; color:var(--ink); cursor:pointer; }
  .cbtn i{ font-size:26px; color:var(--green); }
  .cbtn:active{ transform:scale(.96); }
  .cbtn .cnt{ font-size:11px; color:#7a8a76; font-weight:700; }

  .grades{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:16px; }
  .gbtn{ border:1px solid var(--line); background:var(--card); border-radius:14px; padding:11px 0;
         font-size:14px; font-weight:700; color:#7a8a76; cursor:pointer; }
  .gbtn.sel{ background:var(--green); color:#fff; border-color:var(--green); }
  .gbtn:active{ transform:scale(.97); }
  .study-btn{ margin-top:12px; width:100%; border:none; border-radius:18px; padding:18px; font-size:19px; font-weight:800;
              background:var(--green); color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .study-btn:active{ transform:scale(.98); }

  /* study screen */
  .qhead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .back{ background:none; border:none; font-size:26px; color:var(--green); cursor:pointer; padding:4px; }
  .qprog{ font-size:14px; font-weight:700; color:#7a8a76; }
  .qcard{ background:var(--card); border:1px solid var(--line); border-radius:24px; padding:26px 20px; text-align:center; }
  .qhint{ font-size:14px; color:#7a8a76; font-weight:700; margin-bottom:10px; }
  .qicon{ font-size:64px; color:var(--green); }
  .qword{ font-size:38px; font-weight:800; letter-spacing:.5px; margin:6px 0 2px; color:var(--ink); word-break:break-word; line-height:1.15; }
  .qword.long{ font-size:26px; }
  .speak{ background:#e3efdd; border:none; color:var(--green); border-radius:999px; padding:8px 18px; font-size:15px; font-weight:700; margin-top:8px; cursor:pointer; }
  .choices{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px; }
  .ch{ border:1px solid var(--line); background:var(--card); border-radius:18px; padding:12px 10px; color:var(--ink); cursor:pointer; min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; text-align:center; word-break:break-word; }
  .ch:active{ transform:scale(.97); }
  .ch .yomi{ font-size:12px; font-weight:400; color:#8a9a86; line-height:1.2; }
  .ch .base{ font-size:18px; font-weight:700; line-height:1.25; }
  .ch.ok .yomi, .ch.ng .yomi{ color:inherit; opacity:.65; }
  .ch.ok{ background:#e1f5e7; border-color:#aee3bf; color:#1f7a44; }
  .ch.ng{ background:#fdeaea; border-color:#f3c4c4; color:#b23b3b; }
  .reward{ text-align:center; margin-top:20px; font-size:16px; font-weight:700; color:var(--green); min-height:22px; }
  .atabs{ display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin:6px 0 14px; background:#e9efe3; padding:4px; border-radius:12px; }
  .atab{ border:none; background:transparent; border-radius:9px; padding:9px 0; font-size:14px; font-weight:700; color:#7a8a76; cursor:pointer; }
  .atab.sel{ background:var(--card); color:var(--green); box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .atab:active{ transform:scale(.97); }
  .ggrid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gstage{ font-size:14px; font-weight:700; color:var(--green); margin:16px 0 8px; }
  .gcard{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px; text-align:center; }
  .gsprite{ height:84px; border-radius:10px; background:#f1ead7; display:flex; align-items:center; justify-content:center; }
  .gname{ font-size:13px; font-weight:700; margin-top:6px; }
  .gdesc{ font-size:11px; color:#7a8a76; line-height:1.4; margin-top:3px; }
  .eohead{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:8px 0 4px; text-align:center; font-size:11px; font-weight:700; color:#7a8a76; }
  .tiertag{ font-size:12px; font-weight:700; color:var(--green); margin:10px 0 2px; text-align:center; }
  .wlgrades{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  #wlList{ max-height:60vh; overflow-y:auto; border:1px solid var(--line); border-radius:12px; }
  .wlrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; border-bottom:1px solid var(--line); }
  .wlrow:last-child{ border-bottom:none; }
  .wlen{ font-size:16px; font-weight:700; }
  .wlpos{ font-size:10px; font-weight:700; color:#7a8a76; background:#eef2e8; border-radius:6px; padding:1px 6px; margin-left:6px; }
  .wlja{ text-align:right; }
  .wlja .wlyomi{ display:block; font-size:11px; color:#8a9a86; line-height:1.1; }
  .wlja > span:last-child{ font-size:15px; font-weight:700; }
  .tnode{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .tsprite{ width:64px; height:64px; border-radius:12px; background:#f1ead7; display:flex; align-items:center; justify-content:center; }
  .tnode.small .tsprite{ width:52px; height:52px; }
  .tlabel{ font-size:12px; font-weight:700; }
  .tarrow{ text-align:center; color:#b7c3b2; font-size:20px; line-height:1; margin:6px 0; }
  .trow{ display:flex; justify-content:space-around; gap:6px; }
</style>
</head>
<body>

<!-- HOME -->
<section id="home" class="screen on">
  <div class="topbar">
    <div class="name" id="petName">ぴよ</div>
    <div class="stage">
      <button id="openAdmin" aria-label="せってい" style="border:1px solid var(--line); background:var(--card); border-radius:999px; padding:3px 10px; font-size:14px; font-weight:700; color:var(--green); cursor:pointer;">⚙️</button>
      <span class="badge" id="stageBadge">あかちゃん</span>
      <span class="pill">Lv.<span id="lv">1</span></span>
    </div>
  </div>

  <div class="yard">
    <div class="dots"></div>
    <div class="ground"></div>
    <div id="bubble"></div>
    <div id="wagamark" style="position:absolute; top:24px; left:50%; transform:translateX(46px); font-size:30px; font-weight:800; color:#e0792f; display:none;">！</div>
    <div id="petWrap"><svg id="pet" width="126" height="108" shape-rendering="crispEdges"></svg><img id="petImg" alt="" style="display:none; width:120px; height:120px; image-rendering:pixelated; object-fit:contain;"></div>
    <div id="poop"><svg width="30" height="26" shape-rendering="crispEdges">
      <rect x="6" y="15" width="18" height="7" fill="#7a5a2a"/><rect x="9" y="9" width="11" height="6" fill="#9c7438"/><rect x="12" y="4" width="6" height="5" fill="#9c7438"/></svg></div>
  </div>

  <div class="stats">
    <div class="stat"><span class="ic">🍚</span><div class="bar"><i id="hungerBar" style="background:var(--food)"></i></div></div>
    <div class="stat"><span class="ic" style="color:var(--happy)">😊</span><div class="bar"><i id="happyBar" style="background:var(--happy)"></i></div></div>
    <div class="stat"><span class="ic">📏</span><div class="bar"><i id="discBar" style="background:#9b7bd4"></i></div></div>
    <div class="stat"><span class="ic" style="color:var(--xp)">⭐</span><div class="bar"><i id="xpBar" style="background:var(--xp)"></i></div></div>
  </div>

  <div class="care">
    <button class="cbtn" id="bFeed">🍚 ごはん<span class="cnt" id="foodCnt">えさ 0</span></button>
    <button class="cbtn" id="bSnack">🍬 おかし<span class="cnt">たいじゅう+</span></button>
    <button class="cbtn" id="bPlay">🎮 あそぶ<span class="cnt">むりょう</span></button>
    <button class="cbtn" id="bScold">📏 しつけ<span class="cnt" id="scoldCnt">わがまま時</span></button>
    <button class="cbtn" id="bClean">🧹 そうじ<span class="cnt" id="cleanCnt">きれい</span></button>
  </div>

  <div class="grades" id="grades">
    <button class="gbtn" data-g="g3">英検3級</button>
    <button class="gbtn" data-g="jun2">英検準2級</button>
    <button class="gbtn" data-g="g2">英検2級</button>
  </div>
  <button class="study-btn" id="goStudy">📚 えいごの べんきょう</button>
  <div style="text-align:center; margin-top:12px; font-size:13px; color:#7a8a76; font-weight:700;">
    🔥 <span id="streak">1</span>にち ／ おぼえた <span id="learned">0</span>こ ／ たいじゅう <span id="weight">5</span>g
  </div>
  <div id="rev" style="text-align:center; margin-top:8px; font-size:11px; color:#b7c3b2;"></div>
</section>

<!-- STUDY -->
<section id="study" class="screen">
  <div class="qhead">
    <button class="back" id="back">‹</button>
    <div class="qprog"><span id="qNo">1</span> / <span id="qTotal">5</span> もん</div>
    <div style="width:34px"></div>
  </div>
  <div class="qcard">
    <div class="qhint">この えいごの いみは？</div>
    <div class="qword" id="qword">apple</div>
    <button class="speak" id="speak">🔊 きく</button>
  </div>
  <div class="choices" id="choices"></div>
  <div class="reward" id="reward"></div>
</section>

<!-- ADMIN (かんりしゃ) -->
<section id="admin" class="screen">
  <div class="qhead">
    <button class="back" id="backAdmin">‹</button>
    <div class="qprog">かんりしゃページ</div>
    <div style="width:34px"></div>
  </div>

  <div class="atabs" id="atabs">
    <button class="atab sel" data-t="zukan">ずかん</button>
    <button class="atab" data-t="keifu">けいふ</button>
    <button class="atab" data-t="tango">たんご</button>
  </div>

  <div id="tab-zukan" class="atabpane">
    <div id="adminGallery"></div>
  </div>

  <div id="tab-keifu" class="atabpane" style="display:none;">
    <p style="font-size:12px; color:#7a8a76; margin:4px 0 12px;">
      せわミス・しつけミスが <b>すくない</b>ほど「よいこ」、<b>おおい</b>ほど「わんぱく」に育ちます。
    </p>
    <div id="adminTree"></div>
  </div>

  <div id="tab-tango" class="atabpane" style="display:none;">
    <div class="wlgrades" id="wlGrades">
      <button class="gbtn" data-g="g3">英検3級</button>
      <button class="gbtn" data-g="jun2">英検準2級</button>
      <button class="gbtn" data-g="g2">英検2級</button>
    </div>
    <input id="wlSearch" type="search" placeholder="さがす（えいご・いみ）" style="width:100%; margin:10px 0 6px; padding:10px 12px; border:1px solid var(--line); border-radius:12px; font-size:15px;">
    <div id="wlCount" style="font-size:12px; color:#7a8a76; margin-bottom:6px;"></div>
    <div id="wlList"></div>
  </div>
</section>

  normal_e:{map:ADULT,        name:'マルオ',  desc:'げんきで すなおな ふつうの子。'},
  normal_o:{map:ADULT_NORMAL2,name:'ポヨン',  desc:'おっとり マイペース。たべるの だいすき。'},
  wild_e:  {map:ADULT_WILD,   name:'トゲオ',  desc:'やんちゃで げんきいっぱい。いたずらっ子。'},
  wild_o:  {map:ADULT_WILD2,  name:'ツノマル',desc:'まけずぎらいの あばれんぼう。'}
};
function babyInfo(){ return BABIES[state.babyType] || BABIES.e; }
function childInfo(){ return CHILDREN[state.childType] || CHILDREN.e_g; }
function adultInfo(){
  let k=state.adultType;
  if(ADULTS[k]) return ADULTS[k];
  if(k && ADULTS[k+'_e']) return ADULTS[k+'_e']; /* 旧データ移行 */
  return ADULTS.normal_e;
}
function adultMap(){ return adultInfo().map; }
function petMap(){
  if(state.lv>=4) return adultMap();
  if(state.lv>=3) return childInfo().map;
  if(state.lv>=2) return babyInfo().map;
  return EGG;
}
function drawPet(){
  const petSvg=document.getElementById('pet');
  const map=petMap(), ps=8, BOX=120;
  const cols=Math.max.apply(null, map.map(r=>r.length)), rows=map.length;
  const ox=Math.round((BOX-cols*ps)/2), oy=Math.round((BOX-rows*ps)/2);
  let s='';
  for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){
    const c=map[y][x]; if(PAL[c]) s+='<rect x="'+(ox+x*ps)+'" y="'+(oy+y*ps)+'" width="'+ps+'" height="'+ps+'" fill="'+PAL[c]+'"/>';
  }
  petSvg.setAttribute('width',BOX); petSvg.setAttribute('height',BOX); petSvg.setAttribute('viewBox','0 0 '+BOX+' '+BOX);
  petSvg.innerHTML=s;
}

/* ---------- state ---------- */
const KEY='eigopet_v1';
const today=()=> new Date().toISOString().slice(0,10);
let state = load();

function load(){
  let s; try{ s=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  const def={ name:"ぴよ", lv:1, xp:0, hunger:80, happy:80, food:0, dirty:false,
              streak:1, learned:0, last:today(), grade:"g3",
              discipline:50, weight:5, careMiss:0, disciplineMiss:0, wagamama:false,
              babyType:null, childType:null, adultType:null, customImg:{} };
  s=Object.assign({}, def, s||{});
  if(!WORDBANK[s.grade]) s.grade="g3";
  return s;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

function applyDaily(){
  if(state.last===today()) return;
  const prev=new Date(state.last), now=new Date(today());
  const diff=Math.round((now-prev)/86400000);
  state.streak = (diff===1)? state.streak+1 : 1;
  state.hunger=Math.max(0, state.hunger - 30*Math.min(diff,3));
  state.happy =Math.max(0, state.happy  - 20*Math.min(diff,3));
  state.discipline=Math.max(0, state.discipline - 5*Math.min(diff,3));
  // おなか/ごきげんが空のまま放置 → お世話ミス
  if(state.hunger===0) state.careMiss++;
  if(state.happy===0) state.careMiss++;
  state.last=today();
  save();
}

/* ---------- level ---------- */
function need(){ return state.lv*40; }
function addXp(n){
  state.xp+=n;
  while(state.xp>=need() && state.lv<5){
    state.xp-=need(); state.lv++;
    const parity = (state.learned % 2 === 0) ? 'e' : 'o';
    const miss = state.careMiss + state.disciplineMiss;
    if(state.lv===2 && !state.babyType){ state.babyType = parity; }
    else if(state.lv===3 && !state.childType){ state.childType = (state.babyType||'e')+'_'+(miss<=2?'g':'b'); }
    else if(state.lv===4 && !state.adultType){
      const tier = miss===0 ? 'star' : miss<=2 ? 'good' : miss<=5 ? 'normal' : 'wild';
      state.adultType = tier+'_'+parity;
    }
    bubble(stageName()+"になった！");
  }
  if(state.lv>=5) state.xp=Math.min(state.xp, need());
}
function stageName(){
  if(state.lv>=4) return "おとな（"+adultInfo().name+"）";
  if(state.lv>=3) return "こども（"+childInfo().name+"）";
  if(state.lv>=2) return "あかちゃん（"+babyInfo().name+"）";
  return "タマゴ";
}

/* ---------- render ---------- */
function pct(v){ return Math.max(0,Math.min(100,Math.round(v)))+'%'; }
function render(){
  document.getElementById('petName').textContent=state.name;
  document.getElementById('lv').textContent=state.lv;
  document.getElementById('stageBadge').textContent=stageName();
  document.getElementById('hungerBar').style.width=pct(state.hunger);
  document.getElementById('happyBar').style.width=pct(state.happy);
  document.getElementById('discBar').style.width=pct(state.discipline);
  document.getElementById('xpBar').style.width=pct(state.xp/need()*100);
  document.getElementById('foodCnt').textContent='えさ '+state.food;
  document.getElementById('cleanCnt').textContent=state.dirty?'よごれてる':'きれい';
  document.getElementById('scoldCnt').textContent=state.wagamama?'いまだ！':'わがまま時';
  document.getElementById('streak').textContent=state.streak;
  document.getElementById('learned').textContent=state.learned;
  document.getElementById('weight').textContent=Math.round(state.weight);
  document.getElementById('poop').style.display=state.dirty?'block':'none';
  document.getElementById('wagamark').style.display=(state.wagamama && state.lv>=2)?'block':'none';
  document.querySelectorAll('.gbtn').forEach(b=> b.classList.toggle('sel', b.dataset.g===state.grade));
  drawPet();
}
let bubT;
function bubble(t){
  const b=document.getElementById('bubble'); b.textContent=t; b.style.opacity=1;
  clearTimeout(bubT); bubT=setTimeout(()=>b.style.opacity=0,1100);
}
function cheer(){
  const w=document.getElementById('petWrap'); w.classList.add('happy');
  setTimeout(()=>w.classList.remove('happy'),1200);
}

/* ---------- care ---------- */
document.getElementById('bFeed').onclick=()=>{
  if(state.food<=0){ bubble("べんきょうして えさをあつめよう"); return; }
  state.food--; state.hunger=Math.min(100,state.hunger+25); state.happy=Math.min(100,state.happy+5);
  state.weight+=1; addXp(5); if(Math.random()<0.45) state.dirty=true;
  bubble("もぐもぐ"); cheer(); save(); render();
};
document.getElementById('bSnack').onclick=()=>{
  state.happy=Math.min(100,state.happy+14); state.weight+=3;
  if(Math.random()<0.5) state.dirty=true;
  bubble("おいしい！ でも たいじゅう+"); cheer(); save(); render();
};
document.getElementById('bPlay').onclick=()=>{
  state.happy=Math.min(100,state.happy+18); state.weight=Math.max(5,state.weight-1); addXp(5);
  bubble("たのしい！"); cheer(); save(); render();
};
document.getElementById('bScold').onclick=()=>{
  if(state.wagamama){
    state.wagamama=false; state.discipline=Math.min(100,state.discipline+12);
    clearTimeout(wagaTimer); bubble("いいこ だね！"); cheer();
  } else {
    state.discipline=Math.max(0,state.discipline-6); bubble("いまは しからないで…");
  }
  save(); render();
};
document.getElementById('bClean').onclick=()=>{
  if(state.dirty){ state.dirty=false; state.happy=Math.min(100,state.happy+10); bubble("ぴかぴか"); }
  else bubble("きれいだよ");
  save(); render();
};
document.getElementById('petName').onclick=()=>{
  const n=prompt("ペットの なまえは？", state.name);
  if(n && n.trim()){ state.name=n.trim().slice(0,8); save(); render(); }
};
document.getElementById('grades').onclick=(e)=>{
  const b=e.target.closest('.gbtn'); if(!b) return;
  state.grade=b.dataset.g; save(); render();
  bubble(WORDBANK[state.grade].label);
};

/* ---------- かんりしゃページ（キャラずかん・進化の系譜） ---------- */
function spriteSVG(map, cell){
  const cols=Math.max.apply(null, map.map(r=>r.length)), rows=map.length;
  let s='';
  for(let y=0;y<map.length;y++)for(let x=0;x<map[y].length;x++){
    const c=map[y][x]; if(PAL[c]) s+='<rect x="'+(x*cell)+'" y="'+(y*cell)+'" width="'+cell+'" height="'+cell+'" fill="'+PAL[c]+'"/>';
  }
  return '<svg width="'+(cols*cell)+'" height="'+(rows*cell)+'" viewBox="0 0 '+(cols*cell)+' '+(rows*cell)+'" shape-rendering="crispEdges">'+s+'</svg>';
}
function tnode(map, label, small){
  return '<div class="tnode'+(small?' small':'')+'"><div class="tsprite">'+spriteSVG(map,small?3:4)+'</div><div class="tlabel">'+label+'</div></div>';
}
function gcardHTML(m,n,d){
  return '<div class="gcard"><div class="gsprite">'+spriteSVG(m,5)+'</div><div class="gname">'+n+'</div><div class="gdesc">'+d+'</div></div>';
}
function gridHTML(list){ return '<div class="ggrid">'+list.map(c=>gcardHTML(c.map,c.name,c.desc)).join('')+'</div>'; }
function renderAdmin(){
  document.getElementById('adminGallery').innerHTML =
    '<div class="gstage">タマゴ</div>'+gridHTML([{map:EGG,name:'タマゴ',desc:'もうすぐ うまれるよ。たいせつに あたためてね。'}])+
    '<div class="gstage">あかちゃん（2しゅるい）</div>'+gridHTML(Object.values(BABIES))+
    '<div class="gstage">こども（4しゅるい）</div>'+gridHTML(Object.values(CHILDREN))+
    '<div class="gstage">おとな（8しゅるい）</div>'+gridHTML(Object.values(ADULTS));

  let tree = tnode(EGG,'タマゴ')+'<div class="tarrow">↓ うまれる（おぼえた数の ぐうすう/きすう）</div>';
  tree += '<div class="eohead"><span>EVEN（ぐうすう）</span><span>ODD（きすう）</span></div>';
  tree += '<div class="trow">'+tnode(BABIES.e.map,BABIES.e.name,true)+tnode(BABIES.o.map,BABIES.o.name,true)+'</div>';
  tree += '<div class="tarrow">↓ せわが よい / わるい で わかれる</div>';
  tree += '<div class="trow">'+tnode(CHILDREN.e_g.map,CHILDREN.e_g.name,true)+tnode(CHILDREN.o_g.map,CHILDREN.o_g.name,true)+'</div>';
  tree += '<div class="trow">'+tnode(CHILDREN.e_b.map,CHILDREN.e_b.name,true)+tnode(CHILDREN.o_b.map,CHILDREN.o_b.name,true)+'</div>';
  tree += '<div class="tarrow">↓ せわ・しつけの しつで 4だんかい</div>';
  [['star','さいこう ◎◎'],['good','よい ◎'],['normal','ふつう ○'],['wild','わんぱく △']].forEach(([t,tl])=>{
    tree += '<div class="tiertag">'+tl+'</div><div class="trow">'+
      tnode(ADULTS[t+'_e'].map,ADULTS[t+'_e'].name,true)+tnode(ADULTS[t+'_o'].map,ADULTS[t+'_o'].name,true)+'</div>';
  });
  document.getElementById('adminTree').innerHTML = tree;
}
/* たんごリスト */
let wlGrade = 'g3';
function renderWordList(){
  const words = (WORDBANK[wlGrade]||WORDBANK.g3).words;
  const q = (document.getElementById('wlSearch').value||'').trim().toLowerCase();
  const list = q ? words.filter(w=> w[0].toLowerCase().indexOf(q)>=0 || (w[1]||'').indexOf(q)>=0 || (w[2]||'').indexOf(q)>=0 ) : words;
  document.getElementById('wlCount').textContent = list.length+' ご';
  let html='';
  for(let i=0;i<list.length;i++){
    const w=list[i], pos=POS_JA[w[3]]||w[3]||'';
    const yomi = w[2] ? '<span class="wlyomi">'+escJa(w[2])+'</span>' : '';
    html += '<div class="wlrow"><div class="wlen">'+escJa(w[0])+(pos?'<span class="wlpos">'+pos+'</span>':'')+'</div>'+
            '<div class="wlja">'+yomi+'<span>'+escJa(w[1])+'</span></div></div>';
  }
  document.getElementById('wlList').innerHTML = html;
  document.querySelectorAll('#wlGrades .gbtn').forEach(b=> b.classList.toggle('sel', b.dataset.g===wlGrade));
}
document.getElementById('wlGrades').onclick=(e)=>{ const b=e.target.closest('.gbtn'); if(!b) return; wlGrade=b.dataset.g; renderWordList(); };
document.getElementById('wlSearch').oninput=()=> renderWordList();

function setAdminTab(t){
  ['zukan','keifu','tango'].forEach(k=>{ document.getElementById('tab-'+k).style.display = (k===t)?'block':'none'; });
  document.querySelectorAll('#atabs .atab').forEach(b=> b.classList.toggle('sel', b.dataset.t===t));
  window.scrollTo(0,0);
}
document.getElementById('atabs').onclick=(e)=>{ const b=e.target.closest('.atab'); if(!b) return; setAdminTab(b.dataset.t); };

document.getElementById('openAdmin').onclick=()=>{ renderAdmin(); wlGrade=state.grade; renderWordList(); setAdminTab('zukan'); show('admin'); };
document.getElementById('backAdmin').onclick=()=>{ show('home'); render(); };

/* ---------- study ---------- */
let session, qIdx, qList;
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
document.getElementById('goStudy').onclick=startStudy;
document.getElementById('back').onclick=()=>{ show('home'); render(); };

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function startStudy(){
  qList=shuffle(currentWords()).slice(0,QPER); qIdx=0; session={correct:0};
  document.getElementById('qTotal').textContent=qList.length;
  show('study'); nextQ();
}
function escJa(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
function choiceHtml(w){
  const base='<span class="base">'+escJa(w[1])+'</span>';
  const yomi=w[2] ? '<span class="yomi">'+escJa(w[2])+'</span>' : '';
  return yomi+base;
}
function nextQ(){
  if(qIdx>=qList.length){ finishStudy(); return; }
  const correct=qList[qIdx];
  const en=correct[0], ja=correct[1];
  document.getElementById('qNo').textContent=qIdx+1;
  const qw=document.getElementById('qword');
  qw.textContent=en; qw.classList.toggle('long', en.length>12);
  document.getElementById('reward').textContent='';
  // wrong options (same grade, distinct meanings)
  const pool=currentWords().filter(w=>w[0]!==en && w[1]!==ja);
  const opts=shuffle([correct, ...shuffle(pool).slice(0,3)]);
  const box=document.getElementById('choices'); box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button'); b.className='ch'; b.innerHTML=choiceHtml(o);
    b.onclick=()=>answer(b, o===correct, en);
    box.appendChild(b);
  });
  speak(en);
}
function answer(btn, ok, en){
  if(btn.classList.contains('ok')||btn.classList.contains('ng')) return;
  if(ok){
    btn.classList.add('ok');
    session.correct++; state.food++; state.learned++; addXp(8);
    document.getElementById('reward').textContent='せいかい！ えさ +1';
    save();
    setTimeout(()=>{ qIdx++; nextQ(); }, 800);
  } else {
    btn.classList.add('ng');
    document.getElementById('reward').textContent='もういちど！';
  }
}
function finishStudy(){
  bubble('えさ '+session.correct+'こ ゲット！');
  show('home'); cheer(); render();
}
let enVoice=null;
function pickVoice(){
  const vs=(window.speechSynthesis?speechSynthesis.getVoices():[]).filter(v=>/^en[-_]?/i.test(v.lang));
  if(!vs.length) return null;
  // prefer known natural English voices, then any en-US
  const pref=['Samantha','Karen','Daniel','Aaron','Moira','Tessa','Serena','Allison','Ava','Nicky','Google US English','Microsoft'];
  for(const name of pref){ const v=vs.find(v=>v.name.includes(name)); if(v) return v; }
  return vs.find(v=>/en[-_]US/i.test(v.lang)) || vs[0];
}
function ensureVoice(){ if(!enVoice) enVoice=pickVoice(); return enVoice; }
if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=()=>{ enVoice=pickVoice(); }; ensureVoice(); }
function speak(en){
  try{
    if(!window.speechSynthesis) return;
    const u=new SpeechSynthesisUtterance(en);
    const v=ensureVoice();
    if(v){ u.voice=v; u.lang=v.lang; } else { u.lang='en-US'; }
    u.rate=0.8; u.pitch=1.0;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
document.getElementById('speak').onclick=()=> speak(document.getElementById('qword').textContent);

/* ---------- わがままサイン（しつけ） ---------- */
let wagaTimer=null;
function homeVisible(){ return document.getElementById('home').classList.contains('on') && !document.hidden; }
function triggerWagamama(){
  if(state.wagamama || state.lv<2) return;
  state.wagamama=true; render(); bubble("！ かまって！");
  clearTimeout(wagaTimer);
  wagaTimer=setTimeout(()=>{
    if(state.wagamama){ state.wagamama=false; state.disciplineMiss++;
      state.discipline=Math.max(0,state.discipline-4); save(); render(); }
  }, 22000);
}
setInterval(()=>{ if(homeVisible() && !state.wagamama && Math.random()<0.5) triggerWagamama(); }, 30000);

/* ---------- boot ---------- */
applyDaily();
render();
try{ document.getElementById('rev').textContent = 'バージョン '+(typeof APP_REV!=='undefined'?APP_REV:'?'); }catch(e){}
</script>
